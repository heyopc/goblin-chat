<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Custom Social Stream Chat Overlay</title>

  <style>
    @font-face { font-family: "PeebrFont"; src: url("./fonts/Peebr.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "ZaneFont"; src: url("./fonts/Zane.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "SketchFont"; src: url("./fonts/Sketch.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "SpookyFont"; src: url("./fonts/spooky.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "RottFont"; src: url("./fonts/Rott.TTF") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "QueenieFont"; src: url("./fonts/Queenie.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "TrisFont"; src: url("./fonts/Tris.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "CursiveFont"; src: url("./fonts/Cursive.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "ComicSansFont"; src: url("./fonts/Comic_Sans.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "EmulatorFont"; src: url("./fonts/Emulator.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "RetroFont"; src: url("./fonts/Retro.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "PapyrusFont"; src: url("./fonts/Papyrus.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "RansomFont"; src: url("./fonts/Ransom.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "TypewriterFont"; src: url("./fonts/Typewriter.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "PokemonFont"; src: url("./fonts/Pokemon.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "KindergartenFont"; src: url("./fonts/Kindergarten.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "ShalFont"; src: url("./fonts/Shal.ttf") format("truetype"); font-weight: normal; font-style: normal; }
    @font-face { font-family: "CushFont"; src: url("./fonts/Cush.ttf") format("truetype"); font-weight: normal; font-style: normal; }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: "Roboto", Arial, sans-serif;
    }

    #viewerBox {
      position: absolute;
      top: 18px;
      right: 40px;
      width: 560px;
      min-height: 48px;
      padding: 8px 14px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.58);
      border: 2px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        0 8px 22px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.14);
      z-index: 50;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }

    .viewerItem {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 24px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1;
      text-shadow:
        2px 0 0 #000,
        -2px 0 0 #000,
        0 2px 0 #000,
        0 -2px 0 #000,
        0 3px 5px rgba(0, 0, 0, 0.85);
    }

    .viewerIcon {
      width: 26px;
      height: 26px;
      object-fit: contain;
      filter:
        drop-shadow(2px 0 0 #000)
        drop-shadow(-2px 0 0 #000)
        drop-shadow(0 2px 0 #000)
        drop-shadow(0 -2px 0 #000)
        drop-shadow(0 3px 5px rgba(0, 0, 0, 0.65));
    }

    .viewerDivider {
      width: 2px;
      height: 28px;
      background: rgba(255, 255, 255, 0.28);
      border-radius: 999px;
    }

    #chat {
      position: absolute;
      right: 28px;
      bottom: 0;
      width: 572px;
      height: 100vh;
      padding-right: 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 16px;
      pointer-events: none;
      overflow: hidden;
      box-sizing: border-box;
      z-index: 10;
    }

    .message {
      width: 100%;
      max-width: 560px;
      color: white;
      text-align: right;
      flex: 0 0 auto;
      animation: popIn 0.35s ease-out both;
      transform-origin: right bottom;
    }

    .name-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .platform-icon,
    .user-icon,
    .badge-icon {
      object-fit: contain;
      flex: 0 0 auto;
      filter:
        drop-shadow(2px 0 0 #000)
        drop-shadow(-2px 0 0 #000)
        drop-shadow(0 2px 0 #000)
        drop-shadow(0 -2px 0 #000)
        drop-shadow(0 3px 5px rgba(0, 0, 0, 0.65));
    }

    .user-icon {
      width: var(--user-icon-size, 34px);
      height: var(--user-icon-size, 34px);
    }

    .platform-icon {
      width: var(--platform-icon-size, 30px);
      height: var(--platform-icon-size, 30px);
    }

    .badge-icon {
      width: 24px;
      height: 24px;
    }

    .username {
      display: inline-block;
      font-size: var(--name-font-size, 30px);
      font-weight: var(--name-weight, 900);
      line-height: 1;
      color: var(--username-color, #ffffff);
      font-family: var(--name-font, "Roboto", Arial, sans-serif);
      text-shadow:
        3px 0 0 #000,
        -3px 0 0 #000,
        0 3px 0 #000,
        0 -3px 0 #000,
        2px 2px 0 #000,
        -2px 2px 0 #000,
        2px -2px 0 #000,
        -2px -2px 0 #000,
        0 4px 8px rgba(0, 0, 0, 0.9);
    }

    .title {
      display: inline-block;
      font-size: var(--title-font-size, 16px);
      font-weight: var(--title-weight, 900);
      line-height: 1;
      color: var(--title-color, #ffd86b);
      font-family: var(--title-font, var(--name-font, "Roboto", Arial, sans-serif));
      text-transform: uppercase;
      letter-spacing: 0.045em;
      text-shadow:
        2px 0 0 #000,
        -2px 0 0 #000,
        0 2px 0 #000,
        0 -2px 0 #000,
        1px 1px 0 #000,
        -1px 1px 0 #000,
        1px -1px 0 #000,
        -1px -1px 0 #000,
        0 3px 6px rgba(0, 0, 0, 0.85);
    }

    .text {
      width: 100%;
      max-width: 560px;
      font-size: var(--message-font-size, 32px);
      line-height: 1.18;
      font-weight: var(--message-weight, 800);
      color: var(--message-color, #ffffff);
      font-family: var(--message-font, "Roboto", Arial, sans-serif);
      white-space: normal;
      word-break: normal;
      overflow-wrap: break-word;
      text-align: right;
      text-shadow:
        3px 0 0 #000,
        -3px 0 0 #000,
        0 3px 0 #000,
        0 -3px 0 #000,
        2px 2px 0 #000,
        -2px 2px 0 #000,
        2px -2px 0 #000,
        -2px -2px 0 #000,
        0 4px 8px rgba(0, 0, 0, 0.9);
    }

    .text .emote,
    .custom-chat-emote {
      height: 1.25em;
      width: auto;
      vertical-align: -0.25em;
      display: inline-block;
      object-fit: contain;
      margin: 0 0.08em;
      filter:
        drop-shadow(2px 0 0 #000)
        drop-shadow(-2px 0 0 #000)
        drop-shadow(0 2px 0 #000)
        drop-shadow(0 -2px 0 #000)
        drop-shadow(0 3px 5px rgba(0, 0, 0, 0.65));
    }

    .text .emote { max-width: 2.4em; }
    .custom-chat-emote { max-width: 2.6em; }

    #status {
      position: absolute;
      right: 40px;
      bottom: 10px;
      font-size: 16px;
      font-weight: 900;
      color: white;
      opacity: 0.65;
      z-index: 999;
      text-align: right;
      text-shadow:
        2px 0 0 #000,
        -2px 0 0 #000,
        0 2px 0 #000,
        0 -2px 0 #000;
      pointer-events: none;
    }

    .fx-name-shake,
    .fx-title-shake,
    .fx-message-shake,
    .msg-shake {
      display: inline-block;
      animation: fxShake 0.12s infinite;
    }

    .fx-name-sparkle,
    .fx-title-sparkle,
    .fx-message-sparkle,
    .msg-sparkle {
      position: relative;
      display: inline-block;
      overflow: visible;
    }

    .fx-name-sparkle::before,
    .fx-title-sparkle::before,
    .fx-message-sparkle::before,
    .msg-sparkle::before,
    .fx-name-sparkle::after,
    .fx-title-sparkle::after,
    .fx-message-sparkle::after,
    .msg-sparkle::after {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      color: #fff2a8;
      font-family: Arial, sans-serif;
      font-weight: 900;
      filter: none;
      text-shadow: none;
    }

    .fx-name-sparkle::before,
    .fx-title-sparkle::before,
    .fx-message-sparkle::before,
    .msg-sparkle::before {
      content: "✦  ●";
      top: -0.75em;
      right: -0.65em;
      font-size: 0.55em;
      animation: fxSparkleBitsA 1.05s infinite;
    }

    .fx-name-sparkle::after,
    .fx-title-sparkle::after,
    .fx-message-sparkle::after,
    .msg-sparkle::after {
      content: "●  ✧";
      left: -0.55em;
      bottom: -0.45em;
      font-size: 0.48em;
      animation: fxSparkleBitsB 1.25s infinite;
    }

    .fx-name-glow,
    .fx-title-glow,
    .fx-message-glow,
    .msg-glow {
      display: inline-block;
      animation: fxRainbowGlow 1.1s infinite;
    }

    .msg-glow img,
    .msg-glow .emote,
    .msg-glow .custom-chat-emote {
      animation: fxEmoteGlow 1.1s infinite;
    }

    .fx-name-rainbow,
    .fx-title-rainbow,
    .fx-message-rainbow,
    .msg-rainbow {
      display: inline-block;
      animation: fxRainbow 1.8s linear infinite;
    }

    .fx-name-creepy,
    .fx-title-creepy,
    .fx-message-creepy,
    .msg-creepy {
      display: inline-block;
      animation: fxCreepy 2.4s infinite;
      letter-spacing: 0.08em;
      font-family: "SpookyFont", var(--message-font, "Roboto", Arial, sans-serif);
    }

    .fx-name-creepy {
      font-family: "SpookyFont", var(--name-font, "Roboto", Arial, sans-serif);
    }

    .fx-title-creepy {
      font-family: "SpookyFont", var(--title-font, var(--name-font, "Roboto", Arial, sans-serif));
    }

    .fx-message-creepy,
    .msg-creepy,
    .msg-creepy span,
    .msg-creepy .wave-char {
      font-family: "SpookyFont", var(--message-font, "Roboto", Arial, sans-serif);
    }

    .fx-name-wave,
    .fx-title-wave,
    .fx-message-wave {
      display: inline-block;
      animation: fxWave 1.25s ease-in-out infinite;
    }

    .fx-name-flip {
      display: inline-block;
      transform: rotate(180deg);
    }

    .fx-name-mirror {
      display: inline-block;
      transform: scaleX(-1);
    }

    .fx-name-squish {
      display: inline-block;
      animation: fxNameSquish 0.75s infinite;
    }

    .fx-name-scroll {
      display: inline-block;
      max-width: 220px;
      overflow: hidden;
      white-space: nowrap;
      vertical-align: bottom;
    }

    .fx-name-scroll .name-scroll-inner {
      display: inline-block;
      padding-left: 100%;
      animation: fxNameScroll 3s linear infinite;
    }

    @keyframes fxNameSquish {
      0%, 100% { transform: scaleX(1) scaleY(1); }
      50% { transform: scaleX(0.78) scaleY(1.28); }
    }

    @keyframes fxNameScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-120%); }
    }

    .msg-wave {
      display: inline-block;
      white-space: nowrap;
    }

    .msg-wave .wave-char {
      display: inline-block;
      animation: fxCharWave 1.15s ease-in-out infinite;
      animation-delay: calc(var(--i, 0) * 0.065s);
      transform-origin: center bottom;
    }

    /*
      IMPORTANT:
      This makes font color, font size, underline, bold, etc. survive inside animations.
      Without this, wrappers like [wave]!!huge!![/wave] or [blue][spin]text[/spin][/blue]
      can lose their styles.
    */
    .msg-bounce,
    .msg-spin,
    .msg-wobble,
    .msg-panic,
    .msg-scroll-x,
    .msg-scroll-y,
    .msg-mirror,
    .msg-flip,
    .msg-blink,
    .msg-ghost,
    .msg-stretch,
    .msg-squish,
    .msg-jump,
    .msg-float,
    .msg-vibrate,
    .msg-doom,
    .msg-melt,
    .msg-wave,
    .msg-wave .wave-char,
    .scroll-inner {
      color: inherit;
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      text-decoration: inherit;
      text-decoration-thickness: inherit;
      text-underline-offset: inherit;
      text-transform: inherit;
      letter-spacing: inherit;
      line-height: inherit;
    }

    .msg-bold { font-weight: 1000; }
    .msg-italic { font-style: italic; }

    .msg-underline {
      text-decoration: underline;
      text-decoration-thickness: 3px;
      text-underline-offset: 4px;
    }

    .msg-strike {
      text-decoration: line-through;
      text-decoration-thickness: 3px;
    }

    .msg-tiny { font-size: 0.65em; }
    .msg-huge { font-size: 1.35em; }

    .msg-red { color: #ff4b4b; }
    .msg-gold { color: #ffd86b; }
    .msg-green { color: #06d6a0; }
    .msg-blue { color: #4cc9f0; }
    .msg-purple { color: #b388ff; }

    .msg-bounce {
      display: inline-block;
      animation: fxBounce 0.55s infinite;
    }

    .msg-spin {
      display: inline-block;
      animation: fxSpin 1s linear infinite;
    }

    .msg-wobble {
      display: inline-block;
      animation: fxWobble 0.8s infinite;
    }

    .msg-panic {
      display: inline-block;
      animation: fxPanic 0.08s infinite;
    }

    .msg-scroll-x {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      max-width: 100%;
      vertical-align: -0.1em;
    }

    .msg-scroll-x .scroll-inner {
      display: inline-block;
      padding-inline: 0.08em;
      animation: fxScrollX 2.8s linear infinite;
      will-change: transform;
    }

    .msg-scroll-y {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      max-width: 100%;
      height: 1.18em;
      line-height: 1.18em;
      vertical-align: -0.18em;
    }

    .msg-scroll-y .scroll-inner {
      display: inline-block;
      animation: fxScrollY 1.7s linear infinite;
      will-change: transform;
    }

    .msg-mirror {
      display: inline-block;
      transform: scaleX(-1);
    }

    .msg-flip {
      display: inline-block;
      transform: scaleY(-1);
    }

    .msg-blink {
      display: inline-block;
      animation: fxBlink 0.8s steps(2, end) infinite;
    }

    .msg-ghost {
      display: inline-block;
      animation: fxGhost 2s ease-in-out infinite;
    }

    .msg-stretch {
      display: inline-block;
      animation: fxStretch 0.75s infinite;
    }

    .msg-squish {
      display: inline-block;
      animation: fxSquish 0.75s infinite;
    }

    .msg-jump {
      display: inline-block;
      animation: fxJump 0.7s infinite;
    }

    .msg-float {
      display: inline-block;
      animation: fxFloat 2.1s ease-in-out infinite;
    }

    .msg-vibrate {
      display: inline-block;
      animation: fxVibrate 0.045s infinite;
    }

    .msg-doom {
      display: inline-block;
      animation: fxDoom 1.5s infinite;
      letter-spacing: 0.12em;
    }

    .msg-melt {
      display: inline-block;
      animation: fxMelt 1.7s infinite;
    }



    .goblin-chat-temp {
      filter: drop-shadow(0 0 10px rgba(57,255,20,0.9));
    }

    .goblin-hidden {
      display: none !important;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateX(30px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes fxShake {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(1px, -1px) rotate(-0.5deg); }
      50% { transform: translate(-1px, 1px) rotate(0.5deg); }
      75% { transform: translate(1px, 1px) rotate(0deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    @keyframes fxSparkleBitsA {
      0% { opacity: 0; transform: translate(0, 5px) scale(0.55) rotate(0deg); }
      20% { opacity: 1; transform: translate(-2px, 0) scale(1.1) rotate(12deg); }
      55% { opacity: 1; transform: translate(-6px, -5px) scale(0.9) rotate(-8deg); }
      100% { opacity: 0; transform: translate(-9px, -10px) scale(0.45) rotate(20deg); }
    }

    @keyframes fxSparkleBitsB {
      0% { opacity: 0; transform: translate(0, -2px) scale(0.5) rotate(0deg); }
      28% { opacity: 1; transform: translate(3px, -6px) scale(1) rotate(-10deg); }
      62% { opacity: 1; transform: translate(6px, -10px) scale(0.85) rotate(8deg); }
      100% { opacity: 0; transform: translate(10px, -15px) scale(0.4) rotate(-18deg); }
    }

    @keyframes fxEmoteGlow {
      0% {
        filter:
          drop-shadow(0 0 6px rgba(255, 59, 48, 0.95))
          drop-shadow(0 0 14px rgba(255, 59, 48, 0.75))
          drop-shadow(2px 0 0 #000)
          drop-shadow(-2px 0 0 #000)
          drop-shadow(0 2px 0 #000)
          drop-shadow(0 -2px 0 #000)
          drop-shadow(0 3px 5px rgba(0, 0, 0, 0.65));
      }
      25% {
        filter:
          drop-shadow(0 0 6px rgba(255, 204, 0, 0.95))
          drop-shadow(0 0 14px rgba(255, 204, 0, 0.75))
          drop-shadow(2px 0 0 #000)
          drop-shadow(-2px 0 0 #000)
          drop-shadow(0 2px 0 #000)
          drop-shadow(0 -2px 0 #000)
          drop-shadow(0 3px 5px rgba(0, 0, 0, 0.65));
      }
      50% {
        filter:
          drop-shadow(0 0 6px rgba(52, 199, 89, 0.95))
          drop-shadow(0 0 14px rgba(52, 199, 89, 0.75))
          drop-shadow(2px 0 0 #000)
          drop-shadow(-2px 0 0 #000)
          drop-shadow(0 2px 0 #000)
          drop-shadow(0 -2px 0 #000)
          drop-shadow(0 3px 5px rgba(0, 0, 0, 0.65));
      }
      75% {
        filter:
          drop-shadow(0 0 6px rgba(0, 122, 255, 0.95))
          drop-shadow(0 0 14px rgba(0, 122, 255, 0.75))
          drop-shadow(2px 0 0 #000)
          drop-shadow(-2px 0 0 #000)
          drop-shadow(0 2px 0 #000)
          drop-shadow(0 -2px 0 #000)
          drop-shadow(0 3px 5px rgba(0, 0, 0, 0.65));
      }
      100% {
        filter:
          drop-shadow(0 0 6px rgba(255, 59, 48, 0.95))
          drop-shadow(0 0 14px rgba(255, 59, 48, 0.75))
          drop-shadow(2px 0 0 #000)
          drop-shadow(-2px 0 0 #000)
          drop-shadow(0 2px 0 #000)
          drop-shadow(0 -2px 0 #000)
          drop-shadow(0 3px 5px rgba(0, 0, 0, 0.65));
      }
    }

    @keyframes fxRainbowGlow {
      0% {
        color: #ff3b30;
        text-shadow:
          3px 0 0 #000,
          -3px 0 0 #000,
          0 3px 0 #000,
          0 -3px 0 #000,
          0 0 14px rgba(255, 59, 48, 0.95),
          0 0 28px rgba(255, 59, 48, 0.75);
      }
      25% {
        color: #ffcc00;
        text-shadow:
          3px 0 0 #000,
          -3px 0 0 #000,
          0 3px 0 #000,
          0 -3px 0 #000,
          0 0 14px rgba(255, 204, 0, 0.95),
          0 0 28px rgba(255, 204, 0, 0.75);
      }
      50% {
        color: #34c759;
        text-shadow:
          3px 0 0 #000,
          -3px 0 0 #000,
          0 3px 0 #000,
          0 -3px 0 #000,
          0 0 14px rgba(52, 199, 89, 0.95),
          0 0 28px rgba(52, 199, 89, 0.75);
      }
      75% {
        color: #007aff;
        text-shadow:
          3px 0 0 #000,
          -3px 0 0 #000,
          0 3px 0 #000,
          0 -3px 0 #000,
          0 0 14px rgba(0, 122, 255, 0.95),
          0 0 28px rgba(0, 122, 255, 0.75);
      }
      100% {
        color: #ff3b30;
        text-shadow:
          3px 0 0 #000,
          -3px 0 0 #000,
          0 3px 0 #000,
          0 -3px 0 #000,
          0 0 14px rgba(255, 59, 48, 0.95),
          0 0 28px rgba(255, 59, 48, 0.75);
      }
    }

    @keyframes fxRainbow {
      0% { color: #ff595e; }
      20% { color: #ffca3a; }
      40% { color: #8ac926; }
      60% { color: #1982c4; }
      80% { color: #b388ff; }
      100% { color: #ff595e; }
    }

    @keyframes fxCreepy {
      0%, 100% { transform: translateY(0) skewX(0deg); filter: blur(0); }

        .replace(/^@/, "");

      if (raw.includes("twitch")) return "twitch";

      return raw;

        return USER_COSMETICS[cleanPlatform][key];

      return {};

      if (socialStreamColor) {
        generatedUserColors[usernameKey] = socialStreamColor;
        return socialStreamColor;

      if (!generatedUserColors[usernameKey]) {
        const index = Math.floor(Math.random() * RANDOM_NAME_COLORS.length);
        generatedUserColors[usernameKey] = RANDOM_NAME_COLORS[index];

        if (cosmetics.randomTitleEachMessage === false) {

            chosenRandomTitles[lookupKey] = options[index];

          return chosenRandomTitles[lookupKey] || "";

      if (!key || key === ':') return;
      const duration = Number(durationMs || 60000);
      GOBLIN_EFFECTS[bucket][key] = nowMs() + duration;
      scheduleGoblinRenderRefresh(duration);

    function isGoblinEffectActive(bucket, username, platform) {
      const key = goblinEffectKey(username, platform);
      const until = GOBLIN_EFFECTS[bucket][key] || 0;
      if (until && until < nowMs()) {
        delete GOBLIN_EFFECTS[bucket][key];

    function handleGoblinBusMessage(message) {
      if (!message || message.source === 'chat') return;

      if (message.type === 'chat_effect') {
        const duration = Number(message.duration || 60000);

        if (message.effect === 'hide') {
          setGoblinTempEffect('hiddenUsers', message.username, message.platform, duration);
        }

        if (message.effect === 'goblinize') {
          setGoblinTempEffect('goblinUsers', message.username, message.platform, duration);
        }

        if (message.effect === 'scramble') {
          setGoblinTempEffect('scrambledUsers', message.username, message.platform, duration);
        }

        if (message.effect === 'globalScramble') {
          GOBLIN_EFFECTS.globalScrambleUntil = nowMs() + duration;
          scheduleGoblinRenderRefresh(duration);
        }
      }
    }

    function extractSocialStreamMessage(raw) {
      let data = raw;

      if (!data || typeof data !== "object") return null;

      if (data.event === "viewer_updates") {
        return null;
      }

      if (typeof data.value === "string") {
        try {
          const parsed = JSON.parse(data.value);
          if (parsed && typeof parsed === "object") data = parsed;
        } catch (e) {}
      }

      if (data.content && typeof data.content === "object") {
        data = data.content;
      }

      if (data.value && typeof data.value === "object") {
        data = data.value;
      }

      if (data.data && typeof data.data === "object") {
        data = data.data;
      }

      const username =
        data.chatname ||
        data.name ||
        data.username ||
        data.displayName ||
        data.displayname ||
        data.author ||
        "";

      const rawMessage =
        data.chatmessage ||
        data.message ||
        data.text ||
        data.comment ||
        "";

      const platform =
        data.type ||
        data.platform ||
        data.source ||
        "";

      const badges = collectBadgesFromData(data, platform);

      if (!username || !rawMessage) return null;

      return {
        username,
        html: formatChatMessage(rawMessage),
        text: stripHtml(rawMessage),
        platform,
        badges,
        nameColor: data.nameColor || "",
        textColor: data.textColor || ""
      };
    }

    function collectBadgesFromData(data, platform) {
      const badgeSources = [];

      function addBadgeSource(field) {
        if (!field) return;

        if (Array.isArray(field)) {
          field.forEach(item => {
            if (item) badgeSources.push(item);
          });
        } else {
          badgeSources.push(field);
        }
      }

      const rawBadgeFields = [
        data.chatbadges,
        data.chatBadges,
        data.badges,
        data.userbadges,
        data.userBadges,
        data.memberBadges,
        data.membershipBadge,
        data.badge,
        data.badgeList,
        data.user_badges
      ];

      rawBadgeFields.forEach(addBadgeSource);

      const cleanPlatform = normalizePlatform(platform);

      const possibleMemberValues = [
        data.membership,
        data.member,
        data.isMember,
        data.ismember,
        data.isSponsor,
        data.issponsor,
        data.sponsor,
        data.subscriber,
        data.isSubscriber,
        data.isSub,
        data.chatmember
      ];

      const possibleModValues = [
        data.mod,
        data.isMod,
        data.ismod,
        data.moderator,
        data.isModerator,
        data.is_moderator
      ];

      const possibleOwnerValues = [
        data.owner,
        data.isOwner,
        data.isowner,
        data.host,
        data.isHost,
        data.channelOwner
      ];

      const alreadyHasRealBadge = badgeSources.some(item => {
        if (!item) return false;

        if (typeof item === "string") {
          return item.includes("<img") || item.startsWith("http");
        }

        if (typeof item === "object") {
          return Boolean(
            item.src ||
            item.url ||
            item.image ||
            item.imageUrl ||
            item.image_url ||
            item.icon ||
            item.badge
          );
        }

        return false;
      });

      if (!alreadyHasRealBadge && cleanPlatform === "youtube") {
        if (hasTruthyValue(possibleOwnerValues)) {
          badgeSources.push({ src: "./icons/youtube-owner.png", alt: "Owner", local: true });
        }

        if (hasTruthyValue(possibleModValues)) {
          badgeSources.push({ src: "./icons/youtube-mod.png", alt: "Moderator", local: true });
        }

        if (hasTruthyValue(possibleMemberValues)) {
          badgeSources.push({ src: "./icons/youtube-member.png", alt: "Member", local: true });
        }
      }

      if (!alreadyHasRealBadge && cleanPlatform === "twitch") {
        if (hasTruthyValue(possibleModValues)) {
          badgeSources.push({ src: "./icons/twitch-mod.png", alt: "Moderator", local: true });
        }

        if (
          data.vip ||
          data.isVip ||
          data.isVIP ||
          data.badgeType === "vip"
        ) {
          badgeSources.push({ src: "./icons/twitch-vip.png", alt: "VIP", local: true });
        }

        if (hasTruthyValue(possibleMemberValues)) {
          badgeSources.push({ src: "./icons/twitch-sub.png", alt: "Subscriber", local: true });
        }
      }

      return badgeSources;
    }

    function hasTruthyValue(values) {
      return values.some(value => {
        if (value === true) return true;
        if (typeof value === "number") return value > 0;

        const text = String(value || "").toLowerCase().trim();

        return (
          text === "true" ||
          text === "yes" ||
          text === "1" ||
          text.includes("member") ||
          text.includes("sponsor") ||
          text.includes("subscriber") ||
          text.includes("moderator") ||
          text.includes("owner")
        );
      });
    }

    function formatChatMessage(value) {
      let output = sanitizeChatMessage(value);

      /*
        Custom local emotes.
        Example:
          :chris:
          :peebr:
      */
      CUSTOM_CHAT_EMOTES.forEach(emote => {
        if (!emote || !emote.code || !emote.file) return;

        const safeCode = escapeHtml(emote.code);
        const safeFile = escapeHtml(emote.file);
        const safeAlt = escapeHtml(emote.code.replace(/:/g, ""));
        const regex = new RegExp(escapeRegExp(safeCode), "g");

        output = output.replace(
          regex,
          `<img class="custom-chat-emote" src="./icons/emotes/${safeFile}" alt="${safeAlt}" title="${safeAlt}">`
        );
      });

      /*
        PASS 1:
        Text/style wrappers first.
        This allows [wave]!!huge!![/wave], [wave]__underline__[/wave],
        [blue][spin]text[/spin][/blue], etc.
      */

      output = output.replace(/\*\*([^*]+)\*\*/g, '<span class="msg-bold">$1</span>');
      output = output.replace(/__([^_]+)__/g, '<span class="msg-underline">$1</span>');
      output = output.replace(/\^\^([^^]+)\^\^/g, '<span class="msg-tiny">$1</span>');
      output = output.replace(/!!([^!]+)!!/g, '<span class="msg-huge">$1</span>');
      output = output.replace(/--([^-]+)--/g, '<span class="msg-strike">$1</span>');

      output = output.replace(/\[red\]([\s\S]*?)\[\/red\]/gi, '<span class="msg-red">$1</span>');
      output = output.replace(/\[gold\]([\s\S]*?)\[\/gold\]/gi, '<span class="msg-gold">$1</span>');
      output = output.replace(/\[green\]([\s\S]*?)\[\/green\]/gi, '<span class="msg-green">$1</span>');
      output = output.replace(/\[blue\]([\s\S]*?)\[\/blue\]/gi, '<span class="msg-blue">$1</span>');
      output = output.replace(/\[purple\]([\s\S]*?)\[\/purple\]/gi, '<span class="msg-purple">$1</span>');

      /*
        Creepy is both style + animation, so it gets applied before wave.
      */
      output = output.replace(/\|\|([^|]+)\|\|/g, '<span class="msg-creepy">$1</span>');
      output = output.replace(/\[creepy\]([\s\S]*?)\[\/creepy\]/gi, '<span class="msg-creepy">$1</span>');

      /*
        Italic goes after bold so **bold** does not get partially eaten.
      */
      output = output.replace(/\*([^*]+)\*/g, '<span class="msg-italic">$1</span>');

      /*
        PASS 2:
        Animation/movement wrappers after styles.
      */

      output = output.replace(/~~([^~]+)~~/g, '<span class="msg-shake">$1</span>');
      output = output.replace(/==([^=]+)==/g, '<span class="msg-sparkle">$1</span>');

      output = output.replace(/\[glow\]([\s\S]*?)\[\/glow\]/gi, '<span class="msg-glow">$1</span>');
      output = output.replace(/\[sparkle\]([\s\S]*?)\[\/sparkle\]/gi, '<span class="msg-sparkle">$1</span>');
      output = output.replace(/\[shake\]([\s\S]*?)\[\/shake\]/gi, '<span class="msg-shake">$1</span>');
      output = output.replace(/\[bounce\]([\s\S]*?)\[\/bounce\]/gi, '<span class="msg-bounce">$1</span>');
      output = output.replace(/\[spin\]([\s\S]*?)\[\/spin\]/gi, '<span class="msg-spin">$1</span>');
      output = output.replace(/\[wobble\]([\s\S]*?)\[\/wobble\]/gi, '<span class="msg-wobble">$1</span>');

      /*
        Wave must be late because it splits text into per-character spans.
      */
      output = output.replace(/\[wave\]([\s\S]*?)\[\/wave\]/gi, (match, inner) => makeWaveHtml(inner));

      output = output.replace(/\[panic\]([\s\S]*?)\[\/panic\]/gi, '<span class="msg-panic">$1</span>');
      output = output.replace(/\[scroll1\]([\s\S]*?)\[\/scroll1\]/gi, '<span class="msg-scroll-x"><span class="scroll-inner">$1</span></span>');
      output = output.replace(/\[scroll2\]([\s\S]*?)\[\/scroll2\]/gi, '<span class="msg-scroll-y"><span class="scroll-inner">$1</span></span>');
      output = output.replace(/\[mirror\]([\s\S]*?)\[\/mirror\]/gi, '<span class="msg-mirror">$1</span>');
      output = output.replace(/\[flip\]([\s\S]*?)\[\/flip\]/gi, '<span class="msg-flip">$1</span>');
      output = output.replace(/\[blink\]([\s\S]*?)\[\/blink\]/gi, '<span class="msg-blink">$1</span>');
      output = output.replace(/\[ghost\]([\s\S]*?)\[\/ghost\]/gi, '<span class="msg-ghost">$1</span>');
      output = output.replace(/\[stretch\]([\s\S]*?)\[\/stretch\]/gi, '<span class="msg-stretch">$1</span>');
      output = output.replace(/\[squish\]([\s\S]*?)\[\/squish\]/gi, '<span class="msg-squish">$1</span>');
      output = output.replace(/\[jump\]([\s\S]*?)\[\/jump\]/gi, '<span class="msg-jump">$1</span>');
      output = output.replace(/\[float\]([\s\S]*?)\[\/float\]/gi, '<span class="msg-float">$1</span>');
      output = output.replace(/\[vibrate\]([\s\S]*?)\[\/vibrate\]/gi, '<span class="msg-vibrate">$1</span>');
      output = output.replace(/\[doom\]([\s\S]*?)\[\/doom\]/gi, '<span class="msg-doom">$1</span>');
      output = output.replace(/\[melt\]([\s\S]*?)\[\/melt\]/gi, '<span class="msg-melt">$1</span>');
      output = output.replace(/\[rainbow\]([\s\S]*?)\[\/rainbow\]/gi, '<span class="msg-rainbow">$1</span>');

      return output;
    }

    function makeWaveHtml(innerHtml) {
      const parts = String(innerHtml).split(/(<[^>]+>)/g).filter(Boolean);
      let charIndex = 0;

      const waved = parts.map(part => {
        if (part.startsWith("<") && part.endsWith(">")) {
          return part;
        }

        return Array.from(part).map(char => {
          charIndex++;

          if (char === " ") {
            return `<span class="wave-char" style="--i:${charIndex}">&nbsp;</span>`;
          }

          if (char === "\n" || char === "\r" || char === "\t") {
            return char;
          }

          return `<span class="wave-char" style="--i:${charIndex}">${char}</span>`;
        }).join("");
      }).join("");

      return `<span class="msg-wave">${waved}</span>`;
    }

    function sanitizeChatMessage(value) {
      const wrapper = document.createElement("div");
      wrapper.innerHTML = String(value || "");

      function cleanNode(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          return document.createTextNode(node.textContent || "");
        }

        if (node.nodeType !== Node.ELEMENT_NODE) {
          return document.createTextNode("");
        }

        const tag = node.tagName.toLowerCase();

        if (tag === "img") {
          const src = node.getAttribute("src") || "";
          const alt = node.getAttribute("alt") || "";
          const title = node.getAttribute("title") || alt || "";

          if (!isAllowedImageSrc(src)) {
            return document.createTextNode(alt || title || "");
          }

          const img = document.createElement("img");
          img.className = "emote";
          img.src = src;
          img.alt = alt;
          img.title = title;
          return img;
        }

        if (tag === "br") {
          return document.createElement("br");
        }

        const fragment = document.createDocumentFragment();

        node.childNodes.forEach(child => {
          fragment.appendChild(cleanNode(child));
        });

        return fragment;
      }

      const cleaned = document.createElement("div");

      wrapper.childNodes.forEach(child => {
        cleaned.appendChild(cleanNode(child));
      });

      return cleaned.innerHTML;
    }

    function sanitizeBadges(value) {
      if (!value) return "";

      function makeBadgeImg(src, alt) {
        if (!src) return "";

        if (String(src).startsWith("./icons/")) {
          return `<img class="badge-icon" src="${escapeHtml(src)}" alt="${escapeHtml(alt || "badge")}" title="${escapeHtml(alt || "badge")}" />`;
        }

        if (!isAllowedImageSrc(src)) return "";

        return `<img class="badge-icon" src="${escapeHtml(src)}" alt="${escapeHtml(alt || "badge")}" title="${escapeHtml(alt || "badge")}" />`;
      }

      if (Array.isArray(value)) {
        return value.map(item => {
          if (Array.isArray(item)) {
            return sanitizeBadges(item);
          }

          if (typeof item === "string") {
            if (item.startsWith("http") || item.startsWith("./icons/")) {
              return makeBadgeImg(item, "badge");
            }

            const wrapper = document.createElement("div");
            wrapper.innerHTML = item;

            return Array.from(wrapper.querySelectorAll("img")).map(img => {
              const src = img.getAttribute("src") || "";
              const alt = img.getAttribute("alt") || img.getAttribute("title") || "badge";
              return makeBadgeImg(src, alt);
            }).join("");
          }

          if (item && typeof item === "object") {
            const src =
              item.src ||
              item.url ||
              item.image ||
              item.imageUrl ||
              item.image_url ||
              item.icon ||
              item.badge ||
              "";

            const alt =
              item.alt ||
              item.title ||
              item.name ||
              item.badgeType ||
              item.label ||
              item.type ||
              "badge";

            return makeBadgeImg(src, alt);
          }

          return "";
        }).join("");
      }

      if (typeof value === "string") {
        const wrapper = document.createElement("div");
        wrapper.innerHTML = value;

        const imgs = Array.from(wrapper.querySelectorAll("img"));

        return imgs.map(img => {
          const src = img.getAttribute("src") || "";
          const alt = img.getAttribute("alt") || img.getAttribute("title") || "badge";
          return makeBadgeImg(src, alt);
        }).join("");
      }

      if (typeof value === "object") {
        return sanitizeBadges([value]);
      }

      return "";
    }

    function isAllowedImageSrc(src) {
      const safeSrc = String(src || "").toLowerCase();

      if (!safeSrc) return false;

      if (
        safeSrc.startsWith("./icons/") ||
        safeSrc.startsWith("icons/") ||
        safeSrc.startsWith("data:image/")
      ) {
        return true;
      }

      const allowedImageHostHints = [
        "ytimg.com",
        "ggpht.com",
        "googleusercontent.com",
        "gstatic.com",
        "fonts.gstatic.com",

        "twimg.com",
        "twitch.tv",
        "jtvnw.net",
        "static-cdn.jtvnw.net",

        "betterttv.net",
        "bttv.net",
        "cdn.betterttv.net",

        "frankerfacez.com",
        "cdn.frankerfacez.com",

        "7tv.app",
        "7tv.io",
        "cdn.7tv.app",

        "socialstream.ninja",
        "images.weserv.nl"
      ];

      return allowedImageHostHints.some(host => safeSrc.includes(host));
    }

    function stripHtml(value) {
      const temp = document.createElement("div");
      temp.innerHTML = String(value || "");
      return temp.textContent || temp.innerText || "";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function handleViewerUpdate(raw) {
      if (!raw || raw.event !== "viewer_updates" || !raw.meta) return false;

      const youtubeCount = Number(raw.meta.youtube || 0);
      const twitchCount = Number(raw.meta.twitch || 0);

      if (youtubeViewersEl) {
        youtubeViewersEl.textContent = formatViewerCount(youtubeCount);
      }

      if (twitchViewersEl) {
        twitchViewersEl.textContent = formatViewerCount(twitchCount);
      }

      return true;
    }

    function formatViewerCount(value) {
      const count = Number(value || 0);

      if (count >= 1000000) {
        return `${(count / 1000000).toFixed(1).replace(".0", "")}M`;
      }

      if (count >= 1000) {
        return `${(count / 1000).toFixed(1).replace(".0", "")}K`;
      }

      return String(count);
    }

    function connectToSocialStream() {
      const socketUrl = `wss://io.socialstream.ninja/join/${SESSION_ID}/4`;
      const ws = new WebSocket(socketUrl);

      updateStatus("Connecting");

      ws.onopen = () => {
        socketConnected = true;
        updateStatus("Socket open");
      };

      ws.onmessage = (event) => {
        rawEventCount++;

        try {
          const raw = JSON.parse(event.data);

          if (LOG_RAW_EVENTS) {
            console.log("RAW SOCIAL STREAM EVENT:", raw);
          }

          if (handleViewerUpdate(raw)) {
            updateStatus("Viewer update");
            return;
          }

          const parsed = extractSocialStreamMessage(raw);

          if (parsed) {
            parsedEventCount++;
            forwardMessageToGoblin(parsed);
            addMessage(parsed);
          } else {
            updateStatus("Raw received, not parsed");
          }
        } catch (error) {
          updateStatus("JSON parse error");
          console.error("Could not parse Social Stream message:", error, event.data);
        }
      };

      ws.onerror = () => {
        socketConnected = false;
        updateStatus("Socket error");
      };

      ws.onclose = () => {
        socketConnected = false;
        updateStatus("Socket closed, reconnecting");
        setTimeout(connectToSocialStream, 3000);
      };
    }

    function runTestMessages() {
      let index = 0;

      function cycle() {
        addMessage(TEST_MESSAGES[index]);
        index = (index + 1) % TEST_MESSAGES.length;
      }

      cycle();
      setInterval(cycle, 2000);
    }

    updateStatus("Overlay loaded");
    connectToSocialStream();

    if (SHOW_TEST_MESSAGES) {
      runTestMessages();
    }
  </script>
