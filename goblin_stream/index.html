<!DOCTYPE html>
<html>

<style>
html,body{margin:0;padding:0;overflow:hidden;width:1920px;height:1080px;background:transparent;font-family:Arial,sans-serif}#stage{position:relative;width:1920px;height:1080px;overflow:hidden;background:transparent}#goblin{position:absolute;width:auto;height:auto;max-width:none;max-height:none;object-fit:contain;image-rendering:auto;transform-origin:center bottom;pointer-events:none;z-index:80;display:none;--face:1}#goblin.close{width:1920px!important;height:1080px!important;left:0!important;top:0!important;object-fit:contain;z-index:240}.bite{position:absolute;z-index:30;display:block;pointer-events:none;width:360px;height:260px;transform-origin:center}.bite svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 0 2px black)}.perma-slime{position:absolute;width:270px;height:430px;background:rgba(120,255,50,.82);border:6px solid rgba(30,120,0,.9);border-radius:45% 55% 65% 35%;filter:blur(.4px);z-index:35;pointer-events:none}.sticker,.reveal-img{position:absolute;pointer-events:none;z-index:40;object-fit:contain}.sticker{max-width:145px;max-height:145px}.reveal-img{max-width:280px;max-height:205px}.poo,.pee{position:absolute;pointer-events:none;z-index:45;object-fit:contain;width:auto;height:auto}.cage{position:absolute;left:1220px;top:570px;width:430px;height:300px;z-index:42;pointer-events:none;border:10px solid black;box-sizing:border-box;background:repeating-linear-gradient(90deg,transparent 0px,transparent 42px,black 42px,black 56px);filter:drop-shadow(6px 6px 0 rgba(0,0,0,.4));transform:rotate(-2deg)}.cage::before{content:"GOBLIN CAGE";position:absolute;left:50%;top:-48px;transform:translateX(-50%);background:black;color:white;font-size:26px;font-weight:bold;padding:6px 12px;white-space:nowrap}.cage.rattle{animation:cageRattle .07s infinite}.malware-popup{position:absolute;width:350px;min-height:155px;z-index:44;background:#d8d8d8;border:4px solid black;box-shadow:8px 8px 0 rgba(0,0,0,.45);pointer-events:none;font-family:Arial,sans-serif;transform:rotate(var(--rot));animation:malwareJitter .13s infinite}.malware-title{background:#001d8f;color:white;font-size:22px;font-weight:bold;padding:6px 10px;border-bottom:4px solid black;text-transform:uppercase;animation:malwareTitleFlash .35s infinite}.malware-body{color:black;font-size:24px;font-weight:bold;line-height:1.04;padding:16px 14px 10px}.malware-loader{height:18px;background:white;border:3px solid black;margin:0 14px 12px;overflow:hidden}.malware-loader-bar{height:100%;background:lime;animation:malwareScan .4s infinite}.malware-buttons{display:flex;gap:8px;padding:0 14px 14px}.malware-button{background:white;border:3px solid black;padding:5px 12px;font-size:18px;font-weight:bold}.malware-stamp{position:absolute;right:-18px;bottom:-18px;background:red;color:white;border:4px solid black;font-size:18px;font-weight:bold;padding:6px 10px;transform:rotate(12deg);animation:malwareBlink .22s infinite}.malware-warning{display:inline-block;font-size:30px;margin-right:6px;animation:malwareBlink .18s infinite}#flash{position:absolute;width:230px;height:230px;background:radial-gradient(circle,white 0%,yellow 25%,orange 50%,rgba(255,0,0,0) 72%);z-index:150;pointer-events:none;display:none;transform:rotate(18deg)}#debug{position:absolute;top:12px;left:12px;z-index:500;display:none;gap:6px;flex-wrap:wrap;max-width:1580px}#debug button{font-size:16px;padding:8px 10px}#debugStats{width:100%;max-width:720px;margin-top:4px;padding:8px 10px;background:rgba(0,0,0,.72);color:#fff;border:2px solid rgba(255,255,255,.45);border-radius:10px;font-size:16px;font-weight:900;line-height:1.35;text-shadow:2px 2px 0 #000;white-space:pre-wrap}#debug .resetGoblin{background:#ffdddd}#debug .resetEffects{background:#ddf0ff}.floaty-icon{position:absolute;z-index:230;pointer-events:none;font-size:56px;font-weight:900;text-shadow:3px 3px 0 black;animation:floatyPop 1.05s ease-out forwards}.sparkle-clean{position:absolute;z-index:220;pointer-events:none;font-size:58px;text-shadow:3px 3px 0 black;animation:sparkleBurst .8s ease-out forwards}.fly{position:absolute;width:8px;height:8px;background:#111;border-radius:50%;z-index:95;pointer-events:none;box-shadow:0 0 0 2px rgba(255,255,255,.25);animation:flyBuzz .055s infinite}.fly::before,.fly::after{content:"";position:absolute;top:-4px;width:7px;height:5px;border-radius:50%;background:rgba(255,255,255,.45)}.fly::before{left:-5px}.fly::after{right:-5px}@keyframes goblinWanderTilt{0%{transform:scaleX(var(--face)) rotate(-8deg)}50%{transform:scaleX(var(--face)) rotate(9deg)}100%{transform:scaleX(var(--face)) rotate(-8deg)}}@keyframes goblinShake{0%{transform:scaleX(var(--face)) translate(0,0) rotate(-3deg)}20%{transform:scaleX(var(--face)) translate(7px,-5px) rotate(5deg)}40%{transform:scaleX(var(--face)) translate(-6px,5px) rotate(-6deg)}60%{transform:scaleX(var(--face)) translate(5px,4px) rotate(4deg)}80%{transform:scaleX(var(--face)) translate(-5px,-3px) rotate(-4deg)}100%{transform:scaleX(var(--face)) translate(0,0) rotate(-3deg)}}@keyframes goblinDragShake{0%{transform:scaleX(var(--face)) translate(0,0) rotate(-1deg)}25%{transform:scaleX(var(--face)) translate(4px,-2px) rotate(1deg)}50%{transform:scaleX(var(--face)) translate(-3px,2px) rotate(-1deg)}75%{transform:scaleX(var(--face)) translate(3px,1px) rotate(1deg)}100%{transform:scaleX(var(--face)) translate(0,0) rotate(-1deg)}}@keyframes goblinJump{0%{transform:scaleX(var(--face)) translateY(0) scale(1)}30%{transform:scaleX(var(--face)) translateY(-85px) scale(1.08)}55%{transform:scaleX(var(--face)) translateY(8px) scale(.96)}100%{transform:scaleX(var(--face)) translateY(0) scale(1)}}@keyframes goblinTooClosePulse{0%{transform:scale(1.03) rotate(-.5deg)}50%{transform:scale(1.09) rotate(.5deg)}100%{transform:scale(1.03) rotate(-.5deg)}}@keyframes goblinGunKick{0%{transform:scaleX(var(--face)) translateX(0) rotate(0)}30%{transform:scaleX(var(--face)) translateX(24px) rotate(4deg)}100%{transform:scaleX(var(--face)) translateX(0) rotate(0)}}@keyframes malwareJitter{0%{transform:rotate(var(--rot)) translate(0,0)}20%{transform:rotate(var(--rot)) translate(3px,-2px)}40%{transform:rotate(var(--rot)) translate(-2px,3px)}60%{transform:rotate(var(--rot)) translate(2px,2px)}80%{transform:rotate(var(--rot)) translate(-3px,-1px)}100%{transform:rotate(var(--rot)) translate(0,0)}}@keyframes malwareBlink{0%,49%{background:red;color:white}50%,100%{background:yellow;color:black}}@keyframes malwareTitleFlash{0%{background:#001d8f}33%{background:#ff00cc}66%{background:#00aa00}100%{background:#001d8f}}@keyframes malwareScan{0%{width:8%}50%{width:92%}100%{width:31%}}@keyframes cageRattle{0%{transform:rotate(-2deg) translate(0,0)}50%{transform:rotate(2deg) translate(7px,-2px)}100%{transform:rotate(-2deg) translate(-6px,2px)}}@keyframes floatyPop{0%{opacity:0;transform:translateY(20px) scale(.45) rotate(-8deg)}18%{opacity:1;transform:translateY(0) scale(1.1) rotate(5deg)}100%{opacity:0;transform:translateY(-95px) scale(.8) rotate(14deg)}}@keyframes sparkleBurst{0%{opacity:0;transform:scale(.3) rotate(0)}25%{opacity:1;transform:scale(1.25) rotate(15deg)}100%{opacity:0;transform:scale(.65) rotate(80deg)}}@keyframes flyBuzz{0%{transform:translate(0,0)}25%{transform:translate(3px,-3px)}50%{transform:translate(-3px,2px)}75%{transform:translate(2px,4px)}100%{transform:translate(0,0)}}.walking{animation:goblinWanderTilt .16s infinite}.shaking{animation:goblinShake .055s infinite}.draggingShake{animation:goblinDragShake .075s infinite}.jumping{animation:goblinJump .32s ease-out}.tooClosePulse{animation:goblinTooClosePulse .11s infinite}.gunKick{animation:goblinGunKick .18s ease-out}
</style>
</head>
<body>
<div id="stage"><img id="goblin" src="" /><div id="flash"></div><div id="flies"></div><div id="debug">
<button onclick="goblin.play('Attention')">Attention</button><button onclick="goblin.play('Hungry')">Hungry</button><button onclick="goblin.play('Insult')">Insult</button><button onclick="goblin.play('Drag')">Drag</button><button onclick="goblin.play('Flip')">Flip</button><button onclick="goblin.play('Shoot')">Shoot</button><button onclick="goblin.play('Shit')">Shit</button><button onclick="goblin.play('Slime')">Slime</button><button onclick="goblin.play('Close')">Close</button><button onclick="goblin.play('Take Over')">Take Over</button><button onclick="goblin.play('Eat')">Eat</button><button onclick="goblin.play('Sticker')">Sticker</button><button onclick="goblin.play('Reveal')">Reveal</button><button onclick="goblin.play('Cage')">Cage</button><button onclick="goblin.play('Malware')">Malware</button><button onclick="goblin.play('Rando')">Rando</button><button onclick="goblin.play('Change')">Change</button><button onclick="goblin.play('Add To Chat')">Add Goblin</button><button onclick="goblin.debugGoblinize()">Debug Goblinize</button><button onclick="goblin.debugScramble()">Debug Change Msg</button><button onclick="goblin.handleChatCommand('debug','youtube','!feed hotdog')">!feed</button><button onclick="goblin.handleChatCommand('debug','youtube','!pet')">!pet</button><button onclick="goblin.handleChatCommand('debug','youtube','!bonk')">!bonk</button><button onclick="goblin.handleChatCommand('debug','youtube','!clean')">!clean</button><button class="resetGoblin" onclick="goblin.resetGoblin()">Reset Goblin</button><button class="resetEffects" onclick="goblin.resetEffects()">Reset Effects</button><div id="debugStats"></div>
</div></div>
<script>
const IMG="goblin_images/",AUD="audio/",SFX="sound_effects/",OBJ="objects/",REVEALS="images/",STICKERS="stickers/";
const stage=document.getElementById("stage"),goblinEl=document.getElementById("goblin"),flashEl=document.getElementById("flash"),fliesEl=document.getElementById("flies"),debugStatsEl=document.getElementById("debugStats");
let currentAudio=null,mouthTimer=null,wanderTimer=null,wanderStepTimer=null,fartTimer=null,eventTimers=[],currentMood="neutral",currentCategory=null,busy=false,decayPaused=false,pendingZero=false,pendingZeroStat=null;
let x=1520,y=760,facing="right",activeShitMood="shit1",cageAlreadyExists=false,cameraCaged=false,lastNegativeAt=0,lastMajorAt=0,lastCloseAt=0,lastRandoAt=0,lastIdleAt=0,cleanProgress=0,idleTimer=null;
const CAMERA_BOX={x:1220,y:570,w:430,h:300};
const POS={angryLeft:{x:40,y:675},angryRight:{x:1520,y:675},gun:{x:1160,y:520}};
const stats={attention:100,hunger:100,mood:100};
const cleanUsers=new Map(),targetBias=new Map(),recentChatters=[];
let goblinBus=null;try{goblinBus=new BroadcastChannel("goblin_bus");goblinBus.onmessage=e=>handleBusMessage(e.data)}catch(e){}
const SPEEDS={talk:62,chaoticTalk:48,laugh:48,angry:46,sad:66,close:52,streamer:55,slime:55,flip:54,drag:58,shit:50};
const audioCounts={"Add To Chat":4,"Attention":4,"Cage":5,"Change":4,"Close":4,"Drag":4,"Eat":4,"Flip":4,"Hungry":4,"Insult":6,"Lies":4,"Lower":4,"Malware":4,"Rando":20,"Reveal":4,"Shit":4,"Shoot":4,"Slime":4,"Sticker":4,"Take Over":4};
const frames={neutral:["talk_1.png","talk_2.png"],angry:["angry_1.png","angry_2.png"],sad:["sad_1.png","sad_2.png"],laugh1:["laugh_var_1_1.png","laugh_var_1_2.png"],laugh2:["laugh_var_2_1.png","laugh_var_2_2.png"],streamer:["streamer_1.png","streamer_2.png"],close:["too_close_1.png","too_close_2.png"],flip:["flip_1.png","flip_2.png"],slime:["slime_1.png","slime_2.png"],wandering:["wandering.png"],drag:["drag.png"],gun:["gun_1.png"],seductive:["seductive.png"],shit1:["shit_var_1.png"],shit2:["shit_var_2.png"],belly:["talk_var_1.png"]};
const positiveCommands=new Set("pet praise compliment comfort soothe apologize hug brush scratch pat tuck nap sing story play dance look wave hello".split(" "));
const negativeCommands=new Set("yell scold bonk spray ignore mock shame boo point laugh poke tap rattle challenge taunt badgoblin hit".split(" "));
const targetCommands=new Set("sacrifice bribe beg bonk hit".split(" "));
function asset(path){return path.split("/").map(encodeURIComponent).join("/")}function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min}function chance(p){return Math.random()<p}function pick(a){return a[Math.floor(Math.random()*a.length)]}function clamp(v){return Math.max(0,Math.min(100,v))}function now(){return Date.now()}function later(ms,fn){const t=setTimeout(fn,ms);eventTimers.push(t);return t}function wait(ms){return new Promise(r=>later(ms,r))}function clearEventTimers(){for(const t of eventTimers)clearTimeout(t);eventTimers=[]}function clearWanderTimers(){if(wanderTimer)clearInterval(wanderTimer);if(wanderStepTimer)clearTimeout(wanderStepTimer);wanderTimer=null;wanderStepTimer=null}function showCaption(){}function postBus(msg){try{if(goblinBus)goblinBus.postMessage(msg);localStorage.setItem("goblin_bus",JSON.stringify({...msg,_t:Date.now()}))}catch(e){}}window.addEventListener("storage",e=>{if(e.key==="goblin_bus"&&e.newValue){try{handleBusMessage(JSON.parse(e.newValue))}catch(_){}}});
function handleBusMessage(msg){if(!msg||msg.source==="goblin")return;if(msg.type==="chat_message"){rememberChatter(msg.username,msg.platform);if(msg.text)handleChatCommand(msg.username,msg.platform,msg.text)}if(msg.type==="donation"){handleDonation(msg.username,msg.amount,msg.message,msg.platform)}}
function rememberChatter(username,platform=""){const key=userKey(username,platform);if(!key)return;const existing=recentChatters.findIndex(u=>u.key===key);if(existing>=0)recentChatters.splice(existing,1);recentChatters.push({key,username,platform});while(recentChatters.length>80)recentChatters.shift()}function userKey(username,platform=""){const name=String(username||"").trim().toLowerCase().replace(/^@/,"");const plat=String(platform||"").trim().toLowerCase();return name?`${plat}:${name}`:""}function parseTarget(text){const m=String(text||"").match(/@?([a-zA-Z0-9_\-.]+)/);return m?m[1]:""}function addTargetBias(username,platform,amount=5){const key=userKey(username,platform);if(!key)return;const old=targetBias.get(key)||{username,platform,score:0};old.score=Math.min(100,old.score+amount);targetBias.set(key,old)}function pickTarget(){const weighted=[];for(const v of targetBias.values()){const n=Math.max(1,Math.round(v.score));for(let i=0;i<n;i++)weighted.push(v)}let chosen=null;if(weighted.length&&chance(.7))chosen=pick(weighted);else if(recentChatters.length)chosen=pick(recentChatters);if(chosen){const rec=targetBias.get(chosen.key);if(rec){rec.score*=.4;if(rec.score<1)targetBias.delete(chosen.key);else targetBias.set(chosen.key,rec)}}return chosen||{username:"someone",platform:""}}
function spawnFloaty(kind){const el=document.createElement("div");el.className="floaty-icon";el.textContent=kind==="heart"?"💚":"💢";el.style.left=`${Math.max(0,Math.min(1800,x+randInt(40,150)))}px`;el.style.top=`${Math.max(0,Math.min(960,y+randInt(-40,70)))}px`;stage.appendChild(el);setTimeout(()=>el.remove(),1200)}function sparkleBurst(){playOneShot(`${SFX}sparkle.mp3`,.9);for(let i=0;i<18;i++){const el=document.createElement("div");el.className="sparkle-clean";el.textContent=pick(["✦","✧","★","Sparkle"]);el.style.left=`${randInt(80,1700)}px`;el.style.top=`${randInt(60,880)}px`;stage.appendChild(el);setTimeout(()=>el.remove(),900)}}
function changeScore(stat,delta){stats[stat]=clamp(stats[stat]+delta);if(stats[stat]<=0&&!pendingZero){pendingZero=true;pendingZeroStat=stat;decayPaused=true;if(!busy)later(250,handleZeroScore)}}async function applyStatChanges(changes){for(const [stat,delta] of changes){changeScore(stat,delta);await wait(160)}}function startMechanics(){setInterval(()=>{if(busy||decayPaused)return;const stat=pick(["attention","hunger","mood"]);changeScore(stat,-randInt(8,15));updateDebugStats()},6000);scheduleIdleNeedCheck();setInterval(updateDebugStats,500)}function scheduleIdleNeedCheck(){if(idleTimer)clearTimeout(idleTimer);idleTimer=setTimeout(()=>{idleNeedCheck();scheduleIdleNeedCheck()},randInt(7000,15000))}function idleNeedCheck(){if(busy||decayPaused)return;const t=now();const pool=["Rando","Rando","Rando"];if(stats.attention<65)pool.push("Attention","Attention");if(stats.hunger<65)pool.push("Hungry","Hungry");if(stats.mood<65)pool.push("Insult","Insult");if(t-lastCloseAt>240000&&chance(.035)){lastCloseAt=t;return requestEvent("Close")}const ev=pick(pool);if(ev==="Rando")lastRandoAt=t;lastIdleAt=t;requestEvent(ev);updateDebugStats()}async function handleZeroScore(){if(!pendingZero)return;if(busy){later(1000,handleZeroScore);return}pendingZero=false;const stat=pendingZeroStat;pendingZeroStat=null;await runNegativeEvent(stat);stats[stat]=randInt(48,62);stats.attention=clamp(stats.attention+10);stats.hunger=clamp(stats.hunger+8);stats.mood=clamp(stats.mood+8);decayPaused=false}
function requestEvent(category){if(busy)return;goblin.play(category)}async function runNegativeEvent(reason=""){const t=now();if(t-lastNegativeAt<75000){stats[reason]=Math.max(stats[reason]||0,18);decayPaused=false;return}lastNegativeAt=t;const majorOK=t-lastMajorAt>240000;let pool=["Sticker","Sticker","Reveal","Reveal","Slime","Slime","Malware","Eat","Shit","ChatShoot","GoblinizeChat","ScrambleChat"];if(majorOK)pool.push("Drag","Flip","Cage","Take Over");let ev=pick(pool);if(ev==="Cage"&&cageAlreadyExists)ev="Malware";if(ev==="Drag"&&cameraCaged)ev="CageRattle";if(["Drag","Flip","Cage","Take Over"].includes(ev))lastMajorAt=t;if(ev==="ChatShoot"){const target=pickTarget();postBus({source:"goblin",type:"chat_effect",effect:"hide",username:target.username,platform:target.platform,duration:randInt(30000,75000)});return goblin.play("Shoot")}if(ev==="GoblinizeChat"){const target=pickTarget();postBus({source:"goblin",type:"chat_effect",effect:"goblinize",username:target.username,platform:target.platform,duration:randInt(45000,90000)});return goblin.play("Add To Chat")}if(ev==="ScrambleChat"){const target=pickTarget();postBus({source:"goblin",type:"chat_effect",effect:"scramble",username:target.username,platform:target.platform,duration:randInt(45000,90000)});return goblin.play("Change")}if(ev==="CageRattle")return cageRattle();return goblin.play(ev)}
function handleChatCommand(username,platform,text){rememberChatter(username,platform);const raw=String(text||"").trim();if(!raw.startsWith("!"))return;const parts=raw.split(/\s+/);const cmd=parts[0].slice(1).toLowerCase();const rest=raw.slice(parts[0].length).trim();if(cmd==="feed"){if(rest.length>0){spawnFloaty("heart");const cat=classifyFeed(rest);let changes=[["hunger",randInt(8,18)],["attention",3]];if(cat==="bad"){changes.push(["mood",-8]);spawnFloaty("anger")}else if(cat==="weird"){changes.push(["mood",2]);if(chance(.08))changeScore("mood",-5)}else changes.push(["mood",4]);applyStatChanges(changes)}return}if(positiveCommands.has(cmd)){spawnFloaty("heart");applyStatChanges([["attention",randInt(5,10)],["mood",randInt(3,8)]]);if(!busy&&chance(.04))requestEvent("Rando");return}if(negativeCommands.has(cmd)){spawnFloaty("anger");applyStatChanges([["attention",randInt(3,8)],["mood",-randInt(8,16)]]);return}if(cmd==="clean"){handleClean(username,platform);return}if(targetCommands.has(cmd)){const target=parseTarget(rest);if(target){addTargetBias(target,platform,cmd==="sacrifice"?18:9);spawnFloaty(cmd==="beg"?"heart":"anger")}return}}
function classifyFeed(item){const s=String(item||"").toLowerCase();if(/salad|kale|taxes|homework|job application|terms of service|accountability|responsibility|diet|spreadsheet|budget|invoice|irs|gym membership|clean laundry/.test(s))return"bad";if(/battery|printer|router|usb|computer|phone|obs|browser source|stream key|webcam|microphone|dale|ransomware|hotdog|goblin|slop|trash|garbage|drywall|beans|ink|motor oil|rare candy|master ball/.test(s))return"weird";return"normal"}
function handleDonation(username,amount=0,message="",platform=""){rememberChatter(username,platform);spawnFloaty("anger");const a=Number(amount||0);let hit=a>=20?randInt(18,25):a>=5?randInt(10,16):randInt(5,8);applyStatChanges([["attention",-hit],["hunger",-Math.max(4,Math.round(hit*.65))],["mood",-hit]]);const m=String(message||"").toLowerCase();if(/shoot/.test(m))addTargetBias(username,platform,20);if(!busy&&a>=20)later(800,()=>runNegativeEvent("donation"))}
function handleClean(username,platform){const key=userKey(username,platform);const t=now();for(const [k,v] of cleanUsers){if(t-v>45000)cleanUsers.delete(k)}if(key&&!cleanUsers.has(key))cleanUsers.set(key,t);const effectsCount=document.querySelectorAll(".bite,.perma-slime,.sticker,.reveal-img,.poo,.pee,.cage,.malware-popup").length;const goal=Math.min(45,18+effectsCount*4);cleanProgress=cleanUsers.size;if(cleanProgress>=goal){sparkleBurst();removeSomeEffects(randInt(1,3));cleanUsers.clear();cleanProgress=0;spawnFloaty("heart")}else spawnFloaty("heart")}function removeSomeEffects(count){const all=[...document.querySelectorAll(".bite,.perma-slime,.sticker,.reveal-img,.poo,.pee,.malware-popup")];for(let i=0;i<count&&all.length;i++){const el=all.splice(randInt(0,all.length-1),1)[0];el.remove()}}
function stopFartLoop(){if(fartTimer)clearInterval(fartTimer);fartTimer=null}function startFartLoop(){stopFartLoop();fartTimer=setInterval(()=>playOneShot(`${SFX}fart_${randInt(1,15)}.mp3`,.30),randInt(70,145))}function showGoblin(){goblinEl.style.display="block"}function setFacing(dir){facing=dir;goblinEl.style.setProperty("--face",dir==="left"?"-1":"1");if(!goblinEl.classList.contains("close"))goblinEl.style.transform="scaleX(var(--face))"}function faceToward(targetX){setFacing(targetX<x?"left":"right")}function setGoblinPos(nx,ny){x=Math.max(-80,Math.min(1760,nx));y=Math.max(-80,Math.min(900,ny));goblinEl.style.left=`${x}px`;goblinEl.style.top=`${y}px`}function setFrame(file){goblinEl.src=asset(IMG+file)}function clearMotionClasses(){goblinEl.classList.remove("walking","shaking","draggingShake","jumping","gunKick")}function getMoodSpeed(mood){return {angry:SPEEDS.angry,laugh1:SPEEDS.laugh,laugh2:SPEEDS.laugh,sad:SPEEDS.sad,close:SPEEDS.close,streamer:SPEEDS.streamer,slime:SPEEDS.slime,flip:SPEEDS.flip,drag:SPEEDS.drag,shit1:SPEEDS.shit,shit2:SPEEDS.shit}[mood]||SPEEDS.talk}function chooseCornerForAngry(){clearMotionClasses();if(x<960){setFacing("left");setGoblinPos(POS.angryLeft.x,POS.angryLeft.y)}else{setFacing("right");setGoblinPos(POS.angryRight.x,POS.angryRight.y)}}function setMood(mood){currentMood=mood;goblinEl.classList.remove("close","tooClosePulse");if(mood==="close"){clearMotionClasses();goblinEl.style.transform="";goblinEl.classList.add("close","tooClosePulse")}if(mood==="angry")chooseCornerForAngry();setFrame((frames[mood]||frames.neutral)[0])}function stopMouth(){if(mouthTimer)clearInterval(mouthTimer);mouthTimer=null}function startMouth(mood="neutral",speed=null){stopMouth();currentMood=mood;const list=frames[mood]||frames.neutral;let i=0;setMood(mood);if(list.length<=1)return;mouthTimer=setInterval(()=>{i=(i+1)%list.length;setFrame(list[i])},speed??getMoodSpeed(mood))}function randomLaughMood(){return chance(.5)?"laugh1":"laugh2"}function resetGobl function startWandering(){if(busy)return;clearWanderTimers();stopMouth();stopFartLoop();resetGoblinSize();clearMotionClasses();showGoblin();setMood("wandering");goblinEl.classList.add("walking");function next(){if(busy)return;const tx=randInt(80,1560),ty=randInt(120,770),sx=x,sy=y,d=randInt(2200,5200),st=performance.now();faceToward(tx);if(wanderTimer)clearInterval(wanderTimer);wanderTimer=setInterval(()=>{if(busy){clearWanderTimers();return}const t=Math.min(1,(performance.now()-st)/d),ease=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;setGoblinPos(sx+(tx-sx)*ease,sy+(ty-sy)*ease);if(t>=1){clearInterval(wanderTimer);wanderTimer=null;wanderStepTimer=setTimeout(()=>{if(chance(.16))idleMicroBit();next()},randInt(400,1600))}},33)}next()}function idleMicroBit(){if(busy)return;const bit=pick(["look","laugh","seductive"]);if(bit==="laugh"){clearMotionClasses();startMouth(randomLaughMood(),SPEEDS.laugh);later(600,()=>{if(!busy){stopMouth();setMood("wandering");goblinEl.classList.add("walking")}})}else if(bit==="seductive"){clearMotionClasses();stopMouth();setMood("seductive");goblinEl.classList.add("shaking");later(500,()=>{if(!busy){clearMotionClasses();setMood("wandering");goblinEl.classList.add("walking")}})}else setMood("wandering")}
function stopWanderingForEvent(){busy=true;clearWanderTimers();clearMotionClasses()}function resumeWandering(){busy=false;currentCategory=null;currentAudio=null;activeShitMood="shit1";stopMouth();stopFartLoop();resetGoblinSize();clearMotionClasses();startWandering();if(pendingZero)later(500,handleZeroScore)}function getBaseMoodForCategory(category){if(category==="Close")return"close";if(category==="Take Over")return"streamer";if(category==="Shit")return activeShitMood;if(category==="Drag")return"drag";return"neutral"}function applyTimeline(category,n){const base=getBaseMoodForCategory(category);startMouth(base);if(category==="Shit"){clearMotionClasses();setMood(activeShitMood);goblinEl.classList.add(activeShitMood==="shit1"?"shaking":"draggingShake");return}if(category==="Drag"){clearMotionClasses();setMood("drag");goblinEl.classList.add("draggingShake")}const key=`${category} ${n}`;const moodAt=(sec,mood,speed=null)=>later(sec*1000,()=>startMouth(mood,speed));const poseAt=(sec,mood,ms=300)=>later(sec*1000,()=>{stopMouth();setMood(mood);later(ms,()=>startMouth(base))});switch(key){case"Attention 2":moodAt(10,"angry");break;case"Attention 4":moodAt(15,"angry");break;case"Cage 1":moodAt(5,"angry");poseAt(8,"seductive",2000);moodAt(10,"angry");break;case"Cage 2":moodAt(0,"angry");break;case"Cage 4":moodAt(18,"angry");break;case"Flip 1":moodAt(0,randomLaughMood());break;case"Flip 2":moodAt(0,randomLaughMood());moodAt(2,"neutral");moodAt(5,randomLaughMood());moodAt(6,"angry");break;case"Hungry 1":moodAt(0,"sad");later(500,()=>{stopMouth();setMood("belly");goblinEl.classList.add("shaking")});break;case"Hungry 2":case"Hungry 3":moodAt(0,"sad");break;case"Hungry 4":moodAt(0,"sad");moodAt(3,"angry");moodAt(5,"sad");break;case"Insult 4":case"Insult 5":moodAt(0,"angry");break;case"Insult 6":moodAt(0,"sad");break;case"Malware 1":moodAt(0,randomLaughMood());moodAt(1,"neutral");break;case"Shoot 1":moodAt(0,randomLaughMood());moodAt(1,"neutral");moodAt(3,randomLaughMood());break;c async function preIntro(category,n){if(category==="Shoot")await shootIntro();if(category==="Slime")await slimeIntro();if(category==="Shit")await shitIntro();if(category==="Sticker")await stickerIntro();if(category==="Reveal")await revealIntro();if(category==="Cage")await cageIntro();if(category==="Malware")await malwareIntro();if(category==="Close"){clearMotionClasses();setMood("close");startMouth("close")}if(category==="Take Over"){clearMotionClasses();setFacing("right");setGoblinPos(CAMERA_BOX.x,CAMERA_BOX.y-90);setMood("streamer");startMouth("streamer");postBus({source:"goblin",type:"obs_action",action:"takeover",cameraBox:CAMERA_BOX})}if(category==="Drag"){if(cameraCaged){await cageRattle();return}clearMotionClasses();setFacing(CAMERA_BOX.x<960?"left":"right");setGoblinPos(CAMERA_BOX.x+CAMERA_BOX.w-120,CAMERA_BOX.y+CAMERA_BOX.h-60);setMood("drag");goblinEl.classList.add("draggingShake");postBus({source:"goblin",type:"obs_action",action:"drag"});await wait(700)}if(category==="Flip"){clearMotionClasses();setMood("flip");goblinEl.classList.add("shaking");postBus({source:"goblin",type:"obs_action",action:"flip"});await wait(700)}}

async function runEatDuringAudio(audio){stopMouth();resetGoblinSize();clearMotionClasses();const durationSeconds=await waitForMetadata(audio),durationMs=Math.max(2500,durationSeconds*1000),biteCount=Math.max(3,Math.min(8,Math.round(durationMs/1800))),startPadding=450,endPadding=550,usableMs=Math.max(1200,durationMs-startPadding-endPadding);for(let i=0;i<biteCount;i++){const timing=startPadding+usableMs*(i/Math.max(1,biteCount-1));later(timing,async()=>{if(!busy||currentCategory!=="Eat")return;const bx=randInt(90,1540),by=randInt(80,760);faceToward(bx);setGoblinPos(bx-95,by+40);stopMouth();setMood("wandering");goblinEl.classList.add("walking");await wait(150);if(!busy||currentCategory!=="Eat")return;addPermanentBite(bx,by);goblinEl.classList.remove("walking");goblinEl.classList.add("shaking");await wait(120);if(!busy||currentCategory!=="Eat")return;goblinEl.classList.remove("shaking");startMouth("neutral")})}}
function addPermanentBite(left=null,top=null){const w=randInt(260,460),h=randInt(190,340),bite=document.createElement("div");bite.className="bite";bite.style.left=`${left??randInt(100,1500)}px`;bite.style.top=`${top??randInt(100,720)}px`;bite.style.width=`${w}px`;bite.style.height=`${h}px`;bite.style.transform=`rotate(${randInt(-22,22)}deg)`;const teeth=randInt(5,8),circles=[];for(let i=0;i<teeth;i++){const cx=45+i*(270/Math.max(1,teeth-1))+randInt(-10,10),cy=randInt(18,58),r=randInt(28,48);circles.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="black" />`)}bite.innerHTML=`<svg viewBox="0 0 360 260" preserveAspectRatio="none"><path d="M 28 78 C 48 34, 98 56, 118 28 C 144 0, 178 50, 204 24 C 232 -4, 266 52, 304 38 C 346 22, 362 72, 342 116 C 374 164, 318 254, 230 242 C 160 276, 58 236, 40 174 C 0 142, 0 94, 28 78 Z" fill="black"/>${circles.join("")}<circle cx="86" cy="122" r="${randInt(16,30)}" fill="black"/><circle cx="245" cy="150" r="${randInt(18,34)}" fill="black"/><circle cx="174" cy="204" r="${randInt(12,26)}" fill="black"/></svg>`;stage.appendChild(bite)}function addPermanentSlime(){const s=document.createElement("div");s.className="perma-slime";s.style.left=`${randInt(500,1450)}px`;s.style.top=`${randInt(120,650)}px`;s.style.width=`${randInt(180,360)}px`;s.style.height=`${randInt(240,520)}px`;s.style.transform=`rotate(${randInt(-35,35)}deg)`;stage.appendChild(s)}function addPermanentPooAndMaybePee(n){const poo=document.createElement("img");poo.className="poo";poo.src=asset(`${OBJ}poo.png`);poo.style.left=`${x+randInt(40,110)}px`;poo.style.top=`${y+randInt(185,245)}px`;poo.style.transform=`rotate(${randInt(-12,12)}deg)`;stage.appendChild(poo);if(n===2||n===4){const pee=document.createElement("img");pee.className="pee";pee.src=asset(`${OBJ}pee.png`);pee.style.left=`${x+randInt(0,70)}px`;pee.style.top=`${y+randInt(210,260)}px`;pee.style.transform=`rotate(${randInt(-20,20)}deg)`;stage.appendChild(pee)}}function addPermanentCage(){const cage=document.createElem function addMalwarePopup(){const existing=document.querySelectorAll(".malware-popup");if(existing.length>=18)existing[0].remove();const titles=["5 VIRUSES DETECTED","GOBLIN ANTIVIRUS","HOTDOG DRIVER ERROR","SYSTEM32 FULL OF BEES","BACK COUNTRY RANSOMWARE","goblin.exe","UNLICENSED HOTDOG FOUND","WINDOWS DEFENDER GAVE UP","RANSOMWARE FROM A GUY NAMED DALE"],bodies=["Your stream has been infected by some back-country guy's ransomware.","5 viruses detected. 4 are hotdogs. 1 is emotionally complicated.","A man in a shed is encrypting your camera.","OBS has been bitten by a gas station hotdog.","Your PC is being remotely operated by a guy behind a vape shop.","Critical error: too many loose hotdogs in the motherboard.","Ransom note: send 3 hotdogs and a car battery.","Someone named Big Kevin has admin privileges.","Goblin found in system32 eating the little files.","A man named Skeeter is mining coins on your forehead."],buttons=[["OK","NO"],["FEED","RUN"],["DELETE","IGNORE"],["HOTDOG","HELP"],["PAY DALE","LATER"],["UNINSTALL","MAKE WORSE"]],stamps=["INFECTED","HOTDOG","GOBLIN","DALEWARE","BAD","UH OH","RURAL"];const p=document.createElement("div");p.className="malware-popup";p.style.left=`${randInt(80,1480)}px`;p.style.top=`${randInt(70,760)}px`;p.style.setProperty("--rot",`${randInt(-10,10)}deg`);const btn=pick(buttons);p.innerHTML=`<div class="malware-title"><span class="malware-warning">⚠</span>${pick(titles)}</div><div class="malware-body">${pick(bodies)}</div><div class="malware-loader"><div class="malware-loader-bar"></div></div><div class="malware-buttons"><div class="malware-button">${btn[0]}</div><div class="malware-button">${btn[1]}</div></div><div class="malware-stamp">${pick(stamps)}</div>`;stage.appendChild(p)}function addMalwareBurst(count=null){const n=count??randInt(3,5);for(let i=0;i<n;i++)later(i*randInt(120,260),addMalwarePopup)}function clearPermanentObjects(){document.querySelectorAll(".bite,.perma-slime,.sticker,.reveal-img,.poo,.pee,.cage,.malware-popup").forEach(e=>e.remove());cageAlreadyExists=false;cameraCaged=false;updateDebugStats()}function debugEffectCount(){return document.querySelectorAll(".bite,.perma-slime,.sticker,.reveal-img,.poo,.pee,.cage,.malware-popup").length}function updateDebugStats(){if(!debugStatsEl||document.getElementById("debug").style.display!=="flex")return;const nextIdle=idleTimer?"7-15s":"off";debugStatsEl.textContent=`STATS\nAttention: ${Math.round(stats.attention)}   Hunger: ${Math.round(stats.hunger)}   Mood: ${Math.round(stats.mood)}\nBusy: ${busy?"yes":"no"}   Paused: ${decayPaused?"yes":"no"}   Pending 0: ${pendingZero?pendingZeroStat:"no"}\nClean: ${cleanProgress} unique users   Effects: ${debugEffectCount()}   Cage: ${cameraCaged?"yes":"no"}\nRecent chatters: ${recentChatters.length}   Target bias: ${targetBias.size}   Passive check: ${nextIdle}`}function debugGoblinize(){postBus({source:"goblin",type:"chat_effect",effect:"goblinize",username:"debug",platform:"youtube",duration:60000});goblin.play("Add To Chat")}function debugScramble(){postBus({source:"goblin",type:"chat_effect",effect:"scramble",username:"debug",platform:"youtube",duration:60000});goblin.play("Change")}function stopCurrentGoblinOnly(){clearEventTimers();clearWanderTimers();stopMouth();stopFartLoop();if(currentAudio){currentAudio.pause();currentAudio.currentTime=0}currentAudio=null;currentCategory=null;activeShitMood="shit1";busy=false;decayPaused=false;pendingZero=false;flashEl.style.display="none";goblinEl.className="";goblinEl.style.width="";goblinEl.style.height="";goblinEl.style.display="block";setFacing("right");setGoblinPos(1520,760);startWandering()}
